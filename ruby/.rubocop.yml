# Reference: https://github.com/rubocop/ruby-style-guide

plugins:
  - rubocop-minitest
  - rubocop-performance

AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable

# `#:` is the rbs-inline trailing type annotation, not a malformed comment.
Layout/LeadingCommentSpace:
  AllowRBSInlineAnnotation: true
